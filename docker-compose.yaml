version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: ${SPRING_DATASOURCE_DB:-appdb}
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME:-appuser}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  app:
    build: .
    container_name: spring-boot-app
    environment:
      # Database
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}

      # Hikari Connection Pool (optional)
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:-10}
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:-2}
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:-300000}
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:-1800000}
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:-30000}
      SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT: ${SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT:-5000}

      # CloudAMQP / RabbitMQ
      CLOUDAMQP_URI: ${CLOUDAMQP_URI}

      # Server port
      SERVER_PORT: ${SERVER_PORT:-8080}

    depends_on:
      - postgres
    ports:
      - "8080:8080"
    restart: always
    env_file:
      - .env

volumes:
  postgres_data:
